version: "2"
sql:
  - schema: "database/schema.sql" 
    queries: "database/queries.sql"
    engine: "postgresql"
    gen:
      go: 
        package: "db"
        out: "internal/db"
        sql_package: "pgx/v5"
        emit_pointers_for_null_types: true
        overrides:
          - db_type: "uuid"
            go_type: "string"
          - db_type: "timestamp"
            go_type: "time.Time"
          - db_type: "timestamptz"
            go_type: "time.Time"