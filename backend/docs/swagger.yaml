basePath: /
definitions:
  cmd_api.HealthResponse:
    properties:
      db_connected:
        example: true
        type: boolean
      status:
        example: ok
        type: string
      uptime_seconds:
        example: 42
        type: integer
      version:
        example: v0.3.0
        type: string
    type: object
  github_com_aumputthipong_mini-erp-kanban_backend_internal_dto.BoardSummaryResponse:
    properties:
      done_cards:
        type: integer
      id:
        type: string
      members:
        items:
          $ref: '#/definitions/github_com_aumputthipong_mini-erp-kanban_backend_internal_dto.MemberSummary'
        type: array
      title:
        type: string
      total_cards:
        type: integer
      updated_at:
        type: string
    type: object
  github_com_aumputthipong_mini-erp-kanban_backend_internal_dto.CardResponse:
    properties:
      assignee_id:
        type: string
      assignee_name:
        type: string
      column_id:
        type: string
      completed_at:
        type: string
      completed_subtasks:
        type: integer
      created_at:
        type: string
      created_by:
        type: string
      description:
        type: string
      due_date:
        type: string
      estimated_hours:
        type: number
      id:
        type: string
      is_done:
        type: boolean
      position:
        type: number
      priority:
        type: string
      tags:
        items:
          $ref: '#/definitions/github_com_aumputthipong_mini-erp-kanban_backend_internal_dto.TagResponse'
        type: array
      title:
        type: string
      total_subtasks:
        type: integer
    type: object
  github_com_aumputthipong_mini-erp-kanban_backend_internal_dto.ColumnResponse:
    properties:
      cards:
        items:
          $ref: '#/definitions/github_com_aumputthipong_mini-erp-kanban_backend_internal_dto.CardResponse'
        type: array
      category:
        type: string
      color:
        type: string
      id:
        type: string
      position:
        type: number
      title:
        type: string
    type: object
  github_com_aumputthipong_mini-erp-kanban_backend_internal_dto.CreateBoardRequest:
    properties:
      title:
        maxLength: 120
        minLength: 1
        type: string
    required:
    - title
    type: object
  github_com_aumputthipong_mini-erp-kanban_backend_internal_dto.CreateCardRequest:
    properties:
      assignee_id:
        type: string
      column_id:
        type: string
      due_date:
        type: string
      priority:
        enum:
        - low
        - medium
        - high
        type: string
      title:
        maxLength: 200
        minLength: 1
        type: string
    required:
    - column_id
    - title
    type: object
  github_com_aumputthipong_mini-erp-kanban_backend_internal_dto.MemberSummary:
    properties:
      full_name:
        type: string
      user_id:
        type: string
    type: object
  github_com_aumputthipong_mini-erp-kanban_backend_internal_dto.MyTaskResponse:
    properties:
      board_id:
        type: string
      board_name:
        type: string
      column_name:
        type: string
      due_date:
        type: string
      estimated_hours:
        type: number
      id:
        type: string
      priority:
        type: string
      status:
        type: string
      title:
        type: string
    type: object
  github_com_aumputthipong_mini-erp-kanban_backend_internal_dto.TagResponse:
    properties:
      board_id:
        type: string
      color:
        type: string
      id:
        type: string
      name:
        type: string
    type: object
  github_com_aumputthipong_mini-erp-kanban_backend_internal_dto.TrashedBoardDTO:
    properties:
      deleted_at:
        type: string
      id:
        type: string
      title:
        type: string
    type: object
  github_com_aumputthipong_mini-erp-kanban_backend_internal_dto.UpdateBoardRequest:
    properties:
      budget:
        minimum: 0
        type: number
      title:
        maxLength: 120
        minLength: 1
        type: string
    type: object
  github_com_aumputthipong_mini-erp-kanban_backend_internal_dto.UpdateCardRequest:
    properties:
      assignee_id:
        type: string
      description:
        maxLength: 5000
        type: string
      due_date:
        type: string
      estimated_hours:
        maximum: 10000
        minimum: 0
        type: number
      priority:
        enum:
        - low
        - medium
        - high
        type: string
      tag_ids:
        items:
          type: string
        type: array
      title:
        maxLength: 200
        minLength: 1
        type: string
    type: object
  github_com_aumputthipong_mini-erp-kanban_backend_internal_httputil.ErrorResponse:
    properties:
      error:
        type: string
    type: object
  internal_handler.authUserResponse:
    properties:
      email:
        type: string
      full_name:
        type: string
      id:
        type: string
    type: object
  internal_handler.loginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  internal_handler.oauthRequest:
    properties:
      email:
        type: string
      full_name:
        maxLength: 120
        minLength: 1
        type: string
      provider:
        enum:
        - google
        - github
        type: string
      provider_id:
        type: string
    required:
    - email
    - full_name
    - provider
    - provider_id
    type: object
  internal_handler.registerRequest:
    properties:
      email:
        type: string
      full_name:
        maxLength: 120
        minLength: 1
        type: string
      password:
        maxLength: 128
        minLength: 8
        type: string
    required:
    - email
    - full_name
    - password
    type: object
host: localhost:8080
info:
  contact:
    name: Turtask
  description: |-
    Multi-board Kanban + task management with realtime sync.
    Auth uses an HttpOnly `auth_token` cookie issued by /api/auth/login or /api/auth/oauth.
  title: Turtask API
  version: "1.0"
paths:
  /api/auth/login:
    post:
      consumes:
      - application/json
      parameters:
      - description: Credentials
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/internal_handler.loginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handler.authUserResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_aumputthipong_mini-erp-kanban_backend_internal_httputil.ErrorResponse'
        "401":
          description: invalid credentials
          schema:
            $ref: '#/definitions/github_com_aumputthipong_mini-erp-kanban_backend_internal_httputil.ErrorResponse'
      summary: Login
      tags:
      - auth
  /api/auth/logout:
    post:
      responses:
        "204":
          description: No Content
      summary: Logout
      tags:
      - auth
  /api/auth/me:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handler.authUserResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_aumputthipong_mini-erp-kanban_backend_internal_httputil.ErrorResponse'
      security:
      - CookieAuth: []
      summary: Current user
      tags:
      - auth
  /api/auth/oauth:
    post:
      consumes:
      - application/json
      parameters:
      - description: Verified provider payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/internal_handler.oauthRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handler.authUserResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_aumputthipong_mini-erp-kanban_backend_internal_httputil.ErrorResponse'
      summary: OAuth callback (programmatic)
      tags:
      - auth
  /api/auth/register:
    post:
      consumes:
      - application/json
      parameters:
      - description: Email, full name, password (min 8)
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/internal_handler.registerRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/internal_handler.authUserResponse'
        "400":
          description: validation error
          schema:
            $ref: '#/definitions/github_com_aumputthipong_mini-erp-kanban_backend_internal_httputil.ErrorResponse'
        "409":
          description: email already in use
          schema:
            $ref: '#/definitions/github_com_aumputthipong_mini-erp-kanban_backend_internal_httputil.ErrorResponse'
      summary: Register
      tags:
      - auth
  /api/boards:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/github_com_aumputthipong_mini-erp-kanban_backend_internal_dto.BoardSummaryResponse'
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_aumputthipong_mini-erp-kanban_backend_internal_httputil.ErrorResponse'
      security:
      - CookieAuth: []
      summary: List my boards
      tags:
      - boards
    post:
      consumes:
      - application/json
      parameters:
      - description: Board title
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/github_com_aumputthipong_mini-erp-kanban_backend_internal_dto.CreateBoardRequest'
      produces:
      - application/json
      responses:
        "201":
          description: id
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_aumputthipong_mini-erp-kanban_backend_internal_httputil.ErrorResponse'
      security:
      - CookieAuth: []
      summary: Create board
      tags:
      - boards
  /api/boards/{boardID}:
    delete:
      parameters:
      - description: Board UUID
        in: path
        name: boardID
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "403":
          description: not the owner
          schema:
            $ref: '#/definitions/github_com_aumputthipong_mini-erp-kanban_backend_internal_httputil.ErrorResponse'
      security:
      - CookieAuth: []
      summary: Move board to trash
      tags:
      - boards
    get:
      parameters:
      - description: Board UUID
        in: path
        name: boardID
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/github_com_aumputthipong_mini-erp-kanban_backend_internal_dto.ColumnResponse'
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_aumputthipong_mini-erp-kanban_backend_internal_httputil.ErrorResponse'
        "404":
          description: not a member or board not found
          schema:
            $ref: '#/definitions/github_com_aumputthipong_mini-erp-kanban_backend_internal_httputil.ErrorResponse'
      security:
      - CookieAuth: []
      summary: Get board contents
      tags:
      - boards
    patch:
      consumes:
      - application/json
      parameters:
      - description: Board UUID
        in: path
        name: boardID
        required: true
        type: string
      - description: Fields to update
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/github_com_aumputthipong_mini-erp-kanban_backend_internal_dto.UpdateBoardRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_aumputthipong_mini-erp-kanban_backend_internal_dto.BoardSummaryResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_aumputthipong_mini-erp-kanban_backend_internal_httputil.ErrorResponse'
        "403":
          description: not a manager
          schema:
            $ref: '#/definitions/github_com_aumputthipong_mini-erp-kanban_backend_internal_httputil.ErrorResponse'
      security:
      - CookieAuth: []
      summary: Update board
      tags:
      - boards
  /api/cards:
    post:
      consumes:
      - application/json
      parameters:
      - description: Column + title (+ optional fields)
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/github_com_aumputthipong_mini-erp-kanban_backend_internal_dto.CreateCardRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/github_com_aumputthipong_mini-erp-kanban_backend_internal_dto.CardResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_aumputthipong_mini-erp-kanban_backend_internal_httputil.ErrorResponse'
        "404":
          description: column not found
          schema:
            $ref: '#/definitions/github_com_aumputthipong_mini-erp-kanban_backend_internal_httputil.ErrorResponse'
      security:
      - CookieAuth: []
      summary: Create card
      tags:
      - cards
  /api/cards/{cardID}:
    get:
      parameters:
      - description: Card UUID
        in: path
        name: cardID
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_aumputthipong_mini-erp-kanban_backend_internal_dto.CardResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_aumputthipong_mini-erp-kanban_backend_internal_httputil.ErrorResponse'
      security:
      - CookieAuth: []
      summary: Get card detail
      tags:
      - cards
    patch:
      consumes:
      - application/json
      parameters:
      - description: Card UUID
        in: path
        name: cardID
        required: true
        type: string
      - description: Fields to update
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/github_com_aumputthipong_mini-erp-kanban_backend_internal_dto.UpdateCardRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_aumputthipong_mini-erp-kanban_backend_internal_dto.CardResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_aumputthipong_mini-erp-kanban_backend_internal_httputil.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_aumputthipong_mini-erp-kanban_backend_internal_httputil.ErrorResponse'
      security:
      - CookieAuth: []
      summary: Update card
      tags:
      - cards
  /api/my-tasks:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/github_com_aumputthipong_mini-erp-kanban_backend_internal_dto.MyTaskResponse'
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_aumputthipong_mini-erp-kanban_backend_internal_httputil.ErrorResponse'
      security:
      - CookieAuth: []
      summary: My tasks (cross-board)
      tags:
      - my-tasks
  /api/my-tasks/{cardID}/complete:
    post:
      parameters:
      - description: Card UUID
        in: path
        name: cardID
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_aumputthipong_mini-erp-kanban_backend_internal_httputil.ErrorResponse'
        "404":
          description: not the assignee or card missing
          schema:
            $ref: '#/definitions/github_com_aumputthipong_mini-erp-kanban_backend_internal_httputil.ErrorResponse'
      security:
      - CookieAuth: []
      summary: Complete one of my tasks
      tags:
      - my-tasks
  /api/trash:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/github_com_aumputthipong_mini-erp-kanban_backend_internal_dto.TrashedBoardDTO'
            type: array
      security:
      - CookieAuth: []
      summary: List trashed boards
      tags:
      - trash
  /api/trash/{boardID}:
    delete:
      parameters:
      - description: Board UUID
        in: path
        name: boardID
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/github_com_aumputthipong_mini-erp-kanban_backend_internal_httputil.ErrorResponse'
      security:
      - CookieAuth: []
      summary: Permanently delete trashed board
      tags:
      - trash
  /api/trash/{boardID}/restore:
    patch:
      parameters:
      - description: Board UUID
        in: path
        name: boardID
        required: true
        type: string
      responses:
        "204":
          description: No Content
      security:
      - CookieAuth: []
      summary: Restore trashed board
      tags:
      - trash
  /healthz:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/cmd_api.HealthResponse'
        "503":
          description: DB unreachable
          schema:
            $ref: '#/definitions/cmd_api.HealthResponse'
      summary: Health probe
      tags:
      - ops
securityDefinitions:
  CookieAuth:
    in: cookie
    name: auth_token
    type: apiKey
swagger: "2.0"
