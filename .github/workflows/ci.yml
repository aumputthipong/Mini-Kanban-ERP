name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Newer pushes on the same PR cancel any in-flight runs.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (test + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          # Use the exact Go version pinned in go.mod so `go mod tidy` produces
          # the same output locally and in CI (otherwise newer toolchains can
          # rewrite the go directive and trip the tidy-check below).
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Verify go.mod tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum || (echo "::error::go.mod / go.sum out of sync — run 'go mod tidy' locally"; exit 1)

      - name: go vet
        run: go vet ./...

      - name: Run tests
        run: go test -race -coverprofile=coverage.out ./...

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: backend-coverage
          path: backend/coverage.out
          if-no-files-found: ignore

      - name: Build production binary
        run: |
          CGO_ENABLED=0 go build \
            -trimpath \
            -ldflags="-s -w -X main.version=${{ github.sha }}" \
            -o /tmp/api ./cmd/api

      - name: govulncheck (non-blocking — track stdlib + dep CVEs)
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./... || echo "::warning::govulncheck reported vulnerabilities — review the log and bump go.mod or deps when patches are available"

  frontend:
    name: Frontend (typecheck + test + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint --if-present

      - name: Tests
        run: npm test -- --run

      - name: Build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8080/api
          NEXT_PUBLIC_WS_URL: ws://localhost:8080/ws
        run: npm run build

      - name: npm audit (high+ only, non-blocking)
        run: npm audit --audit-level=high || true

  docker:
    name: Docker images build
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4

      - name: Build backend image
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          push: false
          tags: turtask-backend:ci
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max
          build-args: |
            VERSION=${{ github.sha }}

      - name: Build frontend image
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          push: false
          tags: turtask-frontend:ci
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max
          build-args: |
            NEXT_PUBLIC_API_URL=http://localhost:8080/api
            NEXT_PUBLIC_WS_URL=ws://localhost:8080/ws
